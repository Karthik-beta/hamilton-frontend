<div class="card">

    <p-table #dt1 [value]="" dataKey="id" [lazy]="true" [globalFilterFields]="['id','country.name','representative.name','status']"
    [rowHover]="true" styleClass="p-datatable-sm p-datatable-gridlines" responsiveLayout="scroll" [showCurrentPageReport]="true" currentPageReportTemplate="{first} - {last} of {totalRecords}">
    <ng-template pTemplate="caption">
        <div class="flex justify-content-between flex-column sm:flex-row">
            <div>
                <button pButton label="Clear" class="p-button-outlined mb-2" icon="pi pi-filter-slash" (click)="clear(dt1)"></button>
                <!-- <button pButton label="Download" class="p-button-primary mb-2 ml-1 mr-1" icon="pi pi-download" (click)="downloadAndonData()"></button> -->
                <!-- <p-splitButton icon="pi pi-bars" [model]="items" styleClass="p-button-primary mb-2 ml-1 mr-1"></p-splitButton> -->
            </div>
            <span class="p-input-icon-left mb-2">
                <i class="pi pi-search"></i>
                <input pInputText type="text" #filter (input)="onGlobalFilter(dt1, $event)" placeholder="Search Keyword" class="w-full"/>
            </span>
        </div>
    </ng-template>
    <ng-template pTemplate="header">
        <tr>
            <th>SHIFT</th>
          <th>SHIFT START</th>
          <th>SHIFT END</th>
          <th>LUNCH START</th>
          <th>LUNCH END</th>
          <th>OPTIONS</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body">
        <tr>
            <td>Shift A</td>
            <td>6:00 </td>
            <td>14:00 </td>
            <td>9:00 </td>
            <td>9:30 </td>
            <td>
                <div class="d-flex justify-content-center">
                    <p-button icon="pi pi-pencil" class="mr-2"></p-button>
                    <p-button icon="pi pi-eye" class="mr-2" severity="help"></p-button>
                    <p-button icon="pi pi-trash" severity="danger"></p-button>
                </div>
            </td>
        </tr>
        <tr>
            <td>Shift B</td>
            <td>14:00 </td>
            <td>22:00 </td>
            <td>18:00 </td>
            <td>18:30 </td>
            <td>
                <div class="d-flex justify-content-center">
                    <p-button icon="pi pi-pencil" class="mr-2"></p-button>
                    <p-button icon="pi pi-eye" class="mr-2" severity="help"></p-button>
                    <p-button icon="pi pi-trash" severity="danger"></p-button>
                </div>
            </td>
        </tr>
        <tr>
            <td>Shift C</td>
            <td>22:00 </td>
            <td>6:00 </td>
            <td>2:00 </td>
            <td>2:30 </td>
            <td>
                <div class="d-flex justify-content-center">
                    <p-button icon="pi pi-pencil" class="mr-2"></p-button>
                    <p-button icon="pi pi-eye" class="mr-2" severity="help"></p-button>
                    <p-button icon="pi pi-trash" severity="danger"></p-button>
                </div>
            </td>
        </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
        <tr>
            <td colspan="8">No Data found.</td>
        </tr>
    </ng-template>
    <ng-template pTemplate="loadingbody">
        <tr>
            <td colspan="8">Loading data. Please wait.</td>
        </tr>
    </ng-template>
    </p-table>

</div>
